name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check finops/ tests/
          ruff format --check finops/ tests/

      - name: Type check with mypy
        run: mypy finops/ --ignore-missing-imports
        continue-on-error: true  # Non-blocking until type coverage improves

      - name: Run tests
        run: pytest --tb=short -q

      - name: Validate config schema
        run: finops validate-config
